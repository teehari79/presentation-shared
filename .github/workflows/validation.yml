name: Shared Repo Validation

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Validate JSON schemas and examples
        run: ./scripts/validate-schemas.sh

      - name: Validate YAML structure
        run: ./scripts/validate-configs.sh

      - name: Validate changelog/version consistency
        run: ./scripts/validate-versions.sh
