runtime: local
profile: local-dev
providers:
  openai: false
  vertex_ai: false
  azure_foundry: false
  hugging_face: false
  groq: false
  cohere: false
prompt_routes:
  understanding_generation: understanding.v1
  sufficiency_assessment: sufficiency.v1
  clarification_generation: clarification.v1
  default_proposal_generation: default_proposal.v1
  outline_generation: outline.v1
  deck_spec_generation: deck_spec.v1
model_routes:
  understanding_generation: model.understanding
  sufficiency_assessment: model.sufficiency
  clarification_generation: model.clarification
  default_proposal_generation: model.default
  outline_generation: model.outline
  deck_spec_generation: model.deck_spec
model_profile: balanced_enterprise
model_routing:
  tasks:
    understanding.generation:
      reasoning_primary:
        primary:
          provider: openai
          model_id: gpt-4.1-mini
        fallbacks:
          - provider: vertex_ai
            model_id: gemini-2.5-flash
          - provider: azure_foundry
            model_id: fast-general-v1
    clarification.generation:
      reasoning_fast:
        primary:
          provider: openai
          model_id: gpt-4.1-mini
        fallbacks:
          - provider: groq
            model_id: llama-3.3-70b-versatile
    outline.generation:
      reasoning_primary:
        primary:
          provider: openai
          model_id: gpt-4.1-mini
        fallbacks:
          - provider: vertex_ai
            model_id: gemini-2.5-flash
    deck_spec.generation:
      reasoning_primary:
        primary:
          provider: openai
          model_id: gpt-4.1-mini
        fallbacks:
          - provider: azure_foundry
            model_id: fast-general-v1
    sufficiency.classification:
      classification_small:
        primary:
          provider: openai
          model_id: gpt-4.1-mini
        fallbacks:
          - provider: huggingface
            model_id: distilbert-base-uncased
    retrieval.embedding:
      embedding_primary:
        primary:
          provider: openai
          model_id: text-embedding-3-small
        fallbacks:
          - provider: huggingface
            model_id: sentence-transformers/all-MiniLM-L6-v2
    retrieval.reranking:
      reranker_primary:
        primary:
          provider: cohere
          model_id: rerank-v3.5
