version: v1
kind: model_profiles
default_profile: balanced
profiles:
  balanced:
    description: General purpose profile for extraction and generation.
    provider: openai
    model: gpt-5.1
    max_input_tokens: 128000
    max_output_tokens: 8000
    temperature: 0.2
    top_p: 1.0
  fast:
    description: Low-latency profile for routing and light summarization.
    provider: openai
    model: gpt-5-mini
    max_input_tokens: 64000
    max_output_tokens: 3000
    temperature: 0.1
    top_p: 1.0
  quality:
    description: High-quality profile for deck spec and final polish.
    provider: openai
    model: gpt-5.1
    max_input_tokens: 128000
    max_output_tokens: 12000
    temperature: 0.3
    top_p: 1.0
